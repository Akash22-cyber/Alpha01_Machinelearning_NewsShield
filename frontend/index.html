<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsShield | AI Fact-Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <header>
            <div class="logo-wrapper">
                <div class="logo-icon">🛡️</div>
                <h1>NewsShield</h1>
            </div>
            <p class="subtitle">Next-gen LLM news authentication and fact-checking.</p>
        </header>

        <main class="glass-panel">
            <div class="input-section">
                <div class="textarea-wrapper">
                    <textarea id="newsInput" rows="5" placeholder="Paste a headline, article snippet, or claim here..."></textarea>
                    <div class="focus-ring"></div>
                </div>
                
                <button id="analyzeBtn" class="primary-btn">
                    <span id="btnText">Verify Authenticity</span>
                    <div id="btnLoader" class="spinner hidden"></div>
                </button>
            </div>

            <div id="results" class="dashboard hidden">
                <div class="verdict-banner" id="verdictBanner">
                    <h2>Analysis Complete: <span id="predictionBadge" class="badge"></span></h2>
                </div>

                <div class="bento-grid">
                    <div class="bento-card">
                        <div class="card-header">
                            <span class="icon">🎯</span>
                            <h3>AI Confidence</h3>
                        </div>
                        <div class="meter-wrapper">
                            <div class="meter-bg">
                                <div id="confidenceBar" class="meter-fill"></div>
                            </div>
                        </div>
                        <div class="score-display">
                            <span id="confidenceValue">0</span><span class="percent">%</span>
                        </div>
                    </div>

                    <div class="bento-card">
                        <div class="card-header">
                            <span class="icon">🔑</span>
                            <h3>Flagged Patterns</h3>
                        </div>
                        <div id="keywordTags" class="tags-container">
                            </div>
                    </div>

                    <div class="bento-card full-width">
                        <div class="card-header">
                            <span class="icon">🧠</span>
                            <h3>FACTS  </h3>
                        </div>
                        <p id="explanationText" class="reasoning-text"></p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
